  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

tton onclick=\"{{ nextPost }}\" style=\"flex:1; padding:9px 0; border-radius:9px; border:1px solid #E4E0D9; background:#F1EDE6; font-size:13px; font-weight:600; cursor:pointer;\">Next →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div onclick=\"{{ closePost }}\" style=\"position:absolute; top:14px; right:14px; width:32px; height:32px; border-radius:50%; background:rgba(0,0,0,0.5); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px;\">✕<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { open: null, filter: 'all', tab: 'posts' };\n\n  componentDidMount() {\n    this.tryProcessEmbed();\n  }\n  componentDidUpdate() {\n    this.tryProcessEmbed();\n  }\n  tryProcessEmbed() {\n    if (this.state.tab === 'reels') {\n      if (window.instgrm && window.instgrm.Embeds) {\n        window.instgrm.Embeds.process();\n      } else {\n        // embed.js may not have loaded yet — retry briefly\n        let attempts = 0;\n        const retry = () => {\n          attempts++;\n          if (window.instgrm && window.instgrm.Embeds) {\n            window.instgrm.Embeds.process();\n          } else if (attempts < 10) {\n            setTimeout(retry, 400);\n          }\n        };\n        retry();\n      }\n    }\n  }\n\n  posts = [\n    // Arcana\n    { section:'arcana', img:'imgs/obj280.jpg', title:'Product Concept — Tote Bag', brand:'Beyond Arcana', role:'Founder & Creative Director', dotColor:'#7A1F2B',\n      description:\"Extending the Arcana wax-seal mark from packaging onto a product mockup — keeping the brand's mystical, gold-on-maroon identity consistent across every touchpoint.\" },\n    { section:'arcana', img:'imgs/obj217.jpg', title:'Instagram Grid — @beyond.arcana', brand:'Beyond Arcana', role:'Founder & Creative Director', dotColor:'#7A1F2B',\n      description:'Content strategy and grid curation for the brand\\u2019s own Instagram — from styled product shoots to captions, driving genuine post-to-post engagement.' },\n    { section:'arcana', img:'imgs/obj278.jpg', title:'Packaging — Gift Box', brand:'Beyond Arcana', role:'Founder & Creative Director', dotColor:'#7A1F2B',\n      description:'Matte maroon box embossed with the gold Arcana seal — designed end to end, from concept to production-ready art.' },\n    { section:'arcana', img:'imgs/obj275.jpg', title:'Brand Voice — Affirmation Card', brand:'Beyond Arcana', role:'Founder & Creative Director', dotColor:'#7A1F2B',\n      description:'A packaging insert that turns an unboxing into a keepsake moment, built around the line \"Adorn Your Aura.\"' },\n    // SAU\n    { section:'sau', img:'imgs/obj134.jpg', title:'Brand Identity — Logo & Mark', brand:'SA\\u2019U Boutique Cottages', role:'Graphic Designer & Branding Consultant', dotColor:'#5B6B4C',\n      description:'Logo and visual identity for a luxury boutique-cottage brand — a mountain-and-lynx mark built for an earthy, nature-forward property.' },\n    { section:'sau', img:'imgs/obj139.jpg', title:'In-Room Menu', brand:'SA\\u2019U Boutique Cottages', role:'Graphic Designer & Branding Consultant', dotColor:'#5B6B4C',\n      description:'Leather-bound menu concept styled for an in-room dining moment, extending the brand\\u2019s premium tone to guest collateral.' },\n    { section:'sau', img:'imgs/obj135.jpg', title:'Door Hanger', brand:'SA\\u2019U Boutique Cottages', role:'Graphic Designer & Branding Consultant', dotColor:'#5B6B4C',\n      description:'Guest-facing signage carrying the SA\\u2019U mark into every physical touchpoint of the stay.' },\n    { section:'sau', img:'imgs/obj142.jpg', title:'Welcome Postcard', brand:'SA\\u2019U Boutique Cottages', role:'Graphic Designer & Branding Consultant', dotColor:'#5B6B4C',\n      description:'Copy and layout for a welcome postcard, setting the brand\\u2019s tone before a guest even checks in.' },\n    // Burger Club\n    { section:'burger', img:'imgs/obj382.jpg', title:'On-Site Signage', brand:'The Burger Club', role:'Social Media Manager & Graphic Designer', dotColor:'#6A3FA0',\n      description:'Brand identity brought to a physical storefront for a multi-location F&B brand.' },\n    { section:'burger', img:'imgs/obj385.jpg', title:'\"Handmade Patties\" Mural', brand:'The Burger Club', role:'Social Media Manager & Graphic Designer', dotColor:'#6A3FA0',\n      description:'In-store storytelling wall designed to sell the brand\\u2019s process to every guest who walks in.' },\n    { section:'burger', img:'imgs/obj384.jpg', title:'\"Lemonade Zing\" Story Ad', brand:'The Burger Club', role:'Social Media Manager & Graphic Designer', dotColor:'#6A3FA0',\n      description:'One of the daily social and promo assets designed and posted while managing the brand\\u2019s Instagram and Facebook.' },\n    { section:'burger', img:'imgs/obj383.jpg', title:'\"We Are Relocating\" Post', brand:'The Burger Club', role:'Social Media Manager & Graphic Designer', dotColor:'#6A3FA0',\n      description:'Announcement creative built to drive foot traffic to the brand\\u2019s new location.' },\n    // Beauty\n    { section:'beauty', img:'imgs/obj511.jpg', title:'Editorial Beauty Content', brand:'Beauty Campaign', role:'Content Creator', dotColor:'#E85D9A', metric:'52K', hasMetric:true,\n      description:'Part of the beauty product campaign series that generated 56.6M+ views — hands-on direction of photography, styling and captions.' },\n    { section:'beauty', img:'imgs/obj510.jpg', title:'\"Makeup Looks\" Roundup', brand:'Beauty Campaign', role:'Content Creator', dotColor:'#E85D9A',\n      description:'A recurring content format used to grow beauty-client channels — curated looks packaged as a single, swipeable post.' },\n    { section:'beauty', img:'imgs/obj381.jpg', title:'Original Illustration', brand:'Personal Creative Practice', role:'Illustrator (Procreate)', dotColor:'#E85D9A',\n      description:'Hand-drawn digital art from the personal creative practice that feeds the brand\\u2019s content voice.' },\n    { section:'beauty', img:'imgs/obj665.jpg', title:'Digital Illustration — Saturn', brand:'Personal Creative Practice', role:'Illustrator (Procreate)', dotColor:'#E85D9A',\n      description:'Color and mood study made outside client work, part of an ongoing illustration practice.' },\n    // Personal content — @taniya22singh\n    { section:'personal', img:'imgs/ig_post_1.jpg', title:'Editorial Close-Up', brand:'@taniya22singh', role:'Content Creator & Model', dotColor:'#B15C3C',\n      description:'Editorial beauty portrait from her personal Instagram — styling, direction and posting all self-managed.' },\n    { section:'personal', img:'imgs/ig_post_2.jpg', title:'\"Goddess Energy\" Post', brand:'@taniya22singh', role:'Content Creator & Model', dotColor:'#B15C3C', metric:'278', hasMetric:true,\n      description:'Collaboration post with makeup artist @edersonoliver_beauty — captioned \"Goddess Energy\", part of her ongoing personal content library.' },\n    { section:'personal', img:'imgs/ig_post_3.jpg', title:'Floral Editorial Look', brand:'@taniya22singh', role:'Content Creator & Model', dotColor:'#B15C3C',\n      description:'Creative floral makeup editorial — colour theory and prop styling shot and posted independently.' },\n    { section:'personal', img:'imgs/ig_post_4.jpg', title:'\"Let Me Remind Myself\" BTS', brand:'@taniya22singh', role:'Content Creator & Model', dotColor:'#B15C3C', metric:'70', hasMetric:true,\n      description:'Behind-the-scenes story content from a personal shoot — the kind of raw, in-progress moment that keeps a personal brand feeling authentic.' },\n  ];\n\n  reels = [\n    { url:'https://www.instagram.com/reel/CrVXQNPIrT9/' },\n    { url:'https://www.instagram.com/reel/CtL1-IXphhN/' },\n    { url:'https://www.instagram.com/reel/C9mHAMzJ1Q1/' },\n    { url:'https://www.instagram.com/reel/C3fAjsiB-dK/' },\n    { url:'https://www.instagram.com/reel/CtPJiFHKG4B/' },\n    { url:'https://www.instagram.com/reel/CranElRJASa/' },\n    { url:'https://www.instagram.com/reel/C65a9c4BCuu/' },\n    { url:'https://www.instagram.com/reel/C9zQfh4sTeh/' },\n    { url:'https://www.instagram.com/reel/C64G8ztpc-h/' },\n    { url:'https://www.instagram.com/reel/C8JecKIJEXf/' },\n  ];\n\n  tools = ['Adobe Photoshop','Adobe Illustrator','Premiere Pro','Final Cut Pro','CapCut','Procreate','Canva','Meta Ads Manager','Google Analytics'];\n\n  brands = ['Nykaa','Myntra','Garnier','Tresemm\\u00e9','Dot & Key','Jovees','GK Hair','Anytime Fitness','Milani Cosmetics','Benefit Cosmetics','Olens','Anastasia Beverly Hills','Coral Sleek','Jacqueline USA','Swiss Beauty','Moira Cosmetics','Insight Cosmetics','Sky Cosmetics','Maggi','Sinh Salon','Mars Cosmetics','Cut & Style Salon','Character Cosmetics','Kingdom of Lashes','Beyond Arcana','Aegete Official','Bella Vita Organic','Cosmetic Haven','Love Earth','Blissible Cosmetics','Ayouthveda by AMIL','Half N Half','Lone Wolf','Star Struck by Sunny Leone','Burger Club','SA\\u2019U Cottages','Unscripted Affairs'];\n\n  notableFeatures = [\n    { img:'workexp_imgs/obj90.jpg', brand:'Benefit Cosmetics', caption:'Reposted by the official @benefitindia brand page for makeup artistry and beauty content.', stat:'56.6M+ campaign views' },\n    { img:'workexp_imgs/obj105.jpg', brand:'Anastasia Beverly Hills \\u00d7 Nykaa', caption:'Collaborated on the Anastasia Beverly Hills \\u00d7 Nykaa Luxe Store launch campaign.' },\n    { img:'workexp_imgs/obj143.jpg', brand:'Swiss Beauty \\u00d7 Taapsee Pannu', caption:'Beauty campaign inspired by Bollywood actress Taapsee Pannu for Swiss Beauty.', stat:'127K+ views' },\n    { img:'workexp_imgs/obj229.jpg', brand:'Sky Cosmetics', caption:'Website campaign shoot for Sky Cosmetics, photographed by celebrity photographer Rohit Gautam (\"ShutterStrings\").' },\n    { img:'workexp_imgs/obj186.jpg', brand:'RealHit Podcast', caption:'Guest on RealHit \\u2014 5.8M+ YouTube subscribers, discussing life, spirituality and career as a creator.' },\n    { img:'workexp_imgs/obj278.jpg', brand:'Character Cosmetics', caption:'Mother\\u2019s Day storytelling campaign for Dubai-based Character Cosmetics.' },\n  ];\n\n  proofThumbs = [\n    { img:'workexp_imgs/obj93.jpg', label:'Olens India' },\n    { img:'workexp_imgs/obj203.jpg', label:'Nykaa' },\n    { img:'workexp_imgs/obj216.jpg', label:'Myntra Studio' },\n    { img:'workexp_imgs/obj250.jpg', label:'Anytime Fitness' },\n    { img:'workexp_imgs/obj172.jpg', label:'MOIRA' },\n    { img:'workexp_imgs/obj196.jpg', label:'GK Hair' },\n    { img:'workexp_imgs/obj267.jpg', label:'Cut & Style Salon' },\n    { img:'workexp_imgs/obj207.jpg', label:'Insight Cosmetics' },\n  ];\n\n  sections = {\n    arcana: { label:'Beyond Arcana', sub:'Founder & Creative Director — jewellery brand built from concept to launch', dotColor:'#7A1F2B' },\n    sau: { label:'SA\\u2019U Boutique Cottages', sub:'Graphic Designer & Branding Consultant — luxury hospitality identity', dotColor:'#5B6B4C' },\n    burger: { label:'The Burger Club', sub:'Social Media Manager & Graphic Designer — daily content & campaigns', dotColor:'#6A3FA0' },\n    beauty: { label:'Beauty & Content Creation', sub:'56.6M+ views across beauty campaigns, plus personal illustration work', dotColor:'#E85D9A' },\n    personal: { label:'Personal Content — @taniya22singh', sub:'Self-shot, self-styled, self-posted — the personal brand behind the client work', dotColor:'#B15C3C' },\n  };\n\n  setFilter = (f) => this.setState({ filter: f });\n  showPostsTab = () => this.setState({ tab: 'posts' });\n  showReelsTab = () => this.setState({ tab: 'reels' });\n\n  openPost(globalIndex) {\n    this.setState({ open: globalIndex });\n  }\n  closePost = () => this.setState({ open: null });\n  stopClick = (e) => { e.stopPropagation(); };\n  nextPost = () => {\n    this.setState(s => ({ open: s.open === null ? 0 : (s.open + 1) % this.posts.length }));\n  };\n  prevPost = () => {\n    this.setState(s => ({ open: s.open === null ? 0 : (s.open - 1 + this.posts.length) % this.posts.length }));\n  };\n\n  renderVals() {\n    const order = ['arcana','sau','burger','beauty','personal'];\n    const filter = this.state.filter;\n    const activeOrder = filter === 'all' ? order : order.filter(s => s === filter);\n    const combinedItems = filter === 'all' ? [{ isStats: true, key: 'stats' }] : [];\n    let idx = 0;\n    const postsWithIndex = this.posts.map((p, i) => ({ ...p, globalIndex: i }));\n    for (const sec of activeOrder) {\n      combinedItems.push({\n        isHeader: true,\n        anchorId: 'sec-' + sec,\n        label: this.sections[sec].label,\n        sub: this.sections[sec].sub,\n        dotColor: this.sections[sec].dotColor,\n        key: 'header-' + sec\n      });\n      for (const p of postsWithIndex.filter(x => x.section === sec)) {\n        combinedItems.push({\n          isPost: true,\n          img: p.img,\n          title: p.title,\n          hasMetric: !!p.hasMetric,\n          metric: p.metric,\n          onOpen: () => this.openPost(p.globalIndex),\n          key: 'post-' + p.globalIndex\n        });\n      }\n    }\n\n    const filterTabs = [\n      { key: 'all', label: 'All' },\n      { key: 'arcana', label: 'Arcana' },\n      { key: 'sau', label: \"SA'U\" },\n      { key: 'burger', label: 'Burger Club' },\n      { key: 'beauty', label: 'Beauty' },\n      { key: 'personal', label: 'Personal' },\n    ].map(t => ({\n      ...t,\n      onClick: () => this.setFilter(t.key),\n      style: t.key === filter\n        ? \"flex-shrink:0; font-size:12.5px; font-weight:700; padding:7px 14px; border-radius:20px; background:#1E1C1A; color:#FCFBF9; cursor:pointer; border:1px solid #1E1C1A;\"\n        : \"flex-shrink:0; font-size:12.5px; font-weight:600; padding:7px 14px; border-radius:20px; background:#F1EDE6; color:#4A463F; cursor:pointer; border:1px solid #E4E0D9;\"\n    }));\n\n    const open = this.state.open;\n    const activePostRaw = open !== null ? this.posts[open] : null;\n    const activePost = activePostRaw ? { ...activePostRaw, hasMetric: !!activePostRaw.hasMetric } : null;\n\n    const tab = this.state.tab;\n    return {\n      combinedItems,\n      filterTabs,\n      isPostsTab: tab === 'posts',\n      isReelsTab: tab === 'reels',\n      showPostsTab: this.showPostsTab,\n      showReelsTab: this.showReelsTab,\n      postsTabStyle: tab === 'posts'\n        ? \"flex:1; text-align:center; padding:11px 0; border-top:1.5px solid #1E1C1A; margin-top:-1px; font-size:18px; cursor:pointer;\"\n        : \"flex:1; text-align:center; padding:11px 0; font-size:18px; color:#B8B2A8; cursor:pointer;\",\n      reelsTabStyle: tab === 'reels'\n        ? \"flex:1; text-align:center; padding:11px 0; border-top:1.5px solid #1E1C1A; margin-top:-1px; font-size:18px; cursor:pointer;\"\n        : \"flex:1; text-align:center; padding:11px 0; font-size:18px; color:#B8B2A8; cursor:pointer;\",\n      reels: this.reels,\n      tools: this.tools,\n      marqueeRow1: [...this.brands, ...this.brands],\n      marqueeRow2: [...[...this.brands].reverse(), ...[...this.brands].reverse()],\n      notableFeatures: this.notableFeatures,\n      proofThumbs: this.proofThumbs,\n      hasActive: open !== null,\n      activePost: activePost || {},\n      closePost: this.closePost,\n      stopClick: this.stopClick,\n      nextPost: this.nextPost,\n      prevPost: this.prevPost,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
